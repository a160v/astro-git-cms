# Build the site and publish it to Codeberg Pages (or any Forgejo Pages setup)
# by pushing the build output to the `pages` branch.
#
# Requirements on Codeberg:
#   - Enable repository Actions (repo Settings → Units → Actions).
#   - The default token usually may push; if not, add a secret named
#     DEPLOY_TOKEN containing an access token with repository write access.
name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: docker
    container:
      image: docker.io/oven/bun:1
    steps:
      - name: Install git and node
        run: apt-get update && apt-get install -y git nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish dist/ to the pages branch
        env:
          TOKEN: ${{ secrets.DEPLOY_TOKEN != '' && secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          # Codeberg Pages serves .domains and raw files from the pages branch.
          touch .nojekyll
          git init -b pages
          git config user.name "pages-bot"
          git config user.email "pages-bot@noreply.localhost"
          git add -A
          git commit -m "Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force "https://${GITHUB_ACTOR}:${TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" pages
